name: Sync Garmin to Notion
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python & Deps
        shell: pwsh
        run: |
          # Baixa Python 3.11 portátil se não tem
          if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -OutFile python.zip
            Expand-Archive python.zip -DestinationPath ./python
            $env:PATH += ";./python"
          }
          python --version
          python -m pip install --upgrade pip
          pip install garminconnect garth notion-client requests pytz python-dateutil -r requirements.txt
      
      - name: Sync Garmin
        shell: pwsh
        run: python -m garmin_to_notion all
        env:
          GARMIN_EMAIL
