name: Sync Garmin to Notion
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        shell: cmd
        run: |
          python --version
          pip install --upgrade pip
          pip install -r requirements.txt garminconnect garth notion-client requests pytz
      
      - name: Sync Garmin
        shell: cmd
        run: python -m garmin_to_notion all
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TIMEZONE: America/Sao_Paulo
          GARMIN_DAYS_BACK: 30
