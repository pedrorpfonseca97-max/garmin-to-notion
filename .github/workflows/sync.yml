name: Sync Garmin to Notion
on:
  schedule:
    - cron: '0 8 * * *'  # 8h diário
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Python & Install deps
        shell: pwsh
        run: |
          # Procura Python instalado
          $pythonPath = (Get-Command python -ErrorAction SilentlyContinue).Source ?? "python"
          Write-Output "Python: $pythonPath"
          & $pythonPath --version
          
          # Instala pacotes
          & $pythonPath -m pip install --upgrade pip
          & $pythonPath -m pip install -r requirements.txt garminconnect garth notion-client requests python-dateutil pytz
      
      - name: Sync Garmin to Notion
        shell: pwsh
        run: python -m garmin_to_notion all
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TIMEZONE: America/Sao_Paulo
          GARMIN_DAYS_BACK: 30
          GARMIN_ACTIVITIES_FETCH_LIMIT: 1000
