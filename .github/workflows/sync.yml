name: Garmin to Notion Sync

on:
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: self-hosted  # seu runner
    defaults:
      run:
        shell: pwsh  # PowerShell no Windows
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Sync Garmin
        run: python -m garmin_to_notion all
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TIMEZONE: America/Sao_Paulo
          GARMIN_DAYS_BACK: ${{ vars.GARMIN_DAYS_BACK || '30' }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ vars.GARMIN_ACTIVITIES_FETCH_LIMIT || '1000' }}
          PYTHONPATH: src
        run: python -m garmin_to_notion all
